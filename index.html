<!DOCTYPE html>
<html lang="hr">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Turistički informator Slavonski Brod</title>

<style>

*{box-sizing:border-box}

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background:#1a3a6b;
color:#222;
}

header{
background:#142d54;
color:white;
padding:18px 24px;
display:flex;
align-items:center;
gap:16px;
box-shadow:0 2px 8px rgba(0,0,0,0.3);
}

header .icon{
width:56px;
height:56px;
border-radius:12px;
background:#c8a84b;
display:flex;
align-items:center;
justify-content:center;
font-size:28px;
flex-shrink:0;
}

header h1{
margin:0;
font-size:22px;
}

header small{
opacity:0.8;
font-size:13px;
}

.main{
max-width:900px;
margin:auto;
padding:24px;
}

.chat-box{
background:white;
border-radius:14px;
padding:20px;
min-height:380px;
max-height:520px;
box-shadow:0 10px 30px rgba(0,0,0,0.25);
overflow-y:auto;
display:flex;
flex-direction:column;
gap:8px;
}

.user-message{
background:#1a5fa8;
color:white;
padding:12px 16px;
border-radius:10px 10px 2px 10px;
margin:4px 0;
text-align:right;
align-self:flex-end;
max-width:80%;
}

.bot-message{
background:#f4f4f4;
padding:14px 16px;
border-radius:10px 10px 10px 2px;
margin:4px 0;
line-height:1.6;
align-self:flex-start;
max-width:90%;
border-left:3px solid #c8a84b;
}

.typing{
background:#f4f4f4;
padding:12px 16px;
border-radius:10px 10px 10px 2px;
align-self:flex-start;
color:#888;
font-style:italic;
border-left:3px solid #c8a84b;
}

.input-row{
margin-top:16px;
display:flex;
gap:10px;
}

input{
flex:1;
padding:14px 16px;
border-radius:10px;
border:2px solid #ddd;
font-size:16px;
outline:none;
transition:border-color 0.2s;
}

input:focus{
border-color:#1a5fa8;
}

button.send-btn{
background:#c8a84b;
border:none;
padding:12px 22px;
border-radius:10px;
font-weight:bold;
cursor:pointer;
color:#142d54;
font-size:15px;
transition:background 0.2s;
}

button.send-btn:hover{
background:#b8982e;
}

.quick{
margin-top:16px;
display:flex;
gap:8px;
flex-wrap:wrap;
}

.quick button{
background:#1a5fa8;
color:white;
border:none;
padding:10px 16px;
border-radius:20px;
cursor:pointer;
font-size:13px;
transition:background 0.2s;
}

.quick button:hover{
background:#142d54;
}

.suggestions{
margin-top:8px;
display:flex;
gap:6px;
flex-wrap:wrap;
}

.suggestions button{
background:white;
color:#1a5fa8;
border:1px solid #1a5fa8;
padding:6px 12px;
border-radius:16px;
cursor:pointer;
font-size:12px;
transition:all 0.2s;
}

.suggestions button:hover{
background:#1a5fa8;
color:white;
}

a{
color:#1a5fa8;
text-decoration:none;
font-weight:bold;
}

a:hover{
text-decoration:underline;
}

.welcome{
text-align:center;
padding:20px;
color:#666;
}

.welcome .emoji{
font-size:48px;
}

.welcome p{
margin:8px 0;
font-size:15px;
}

</style>

</head>

<body>

<header>
  <div class="icon">🏰</div>
  <div>
    <h1>Turistički informator</h1>
    <small>Slavonski Brod &bull; AI asistent &bull; Tvrđava Brod</small>
  </div>
</header>

<div class="main">

  <div id="chat-box" class="chat-box">
    <div class="welcome">
      <div class="emoji">🏰</div>
      <p><strong>Dobrodošli u Slavonski Brod!</strong></p>
      <p>Pitajte me o znamenitostima, gastronomiji, smještaju, događanjima i svemu što grad nudi.</p>
    </div>
  </div>

  <div class="input-row">
    <input id="user-input" placeholder="Postavite pitanje o Slavonskom Brodu...">
    <button class="send-btn" id="send-btn">Pošalji</button>
  </div>

  <div class="quick">
    <button onclick="quickAsk('Što vidjeti u Slavonskom Brodu?')">🏰 Znamenitosti</button>
    <button onclick="quickAsk('Gdje ručati u Slavonskom Brodu?')">🍽 Gastronomija</button>
    <button onclick="quickAsk('Koja događanja se održavaju?')">🎭 Događanja</button>
    <button onclick="quickAsk('Smještaj u Slavonskom Brodu')">🏨 Smještaj</button>
    <button onclick="quickAsk('Brodsko kolo festival')">🎶 Brodsko kolo</button>
    <button onclick="quickAsk('Izleti iz Slavonskog Broda')">🗺 Okolica</button>
  </div>

</div>

<script>

let chatHistory = [];
let currentCategory = null;

function formatReply(text){
  return text
    .replace(/\n/g,"<br>")
    .replace(/\*\*(.*?)\*\*/g,"<strong>$1</strong>")
    .replace(/\*(.*?)\*/g,"<em>$1</em>")
    .replace(/\[([^\]]+)\]\(([^)]+)\)/g,'<a href="$2" target="_blank" rel="noopener">$1</a>');
}

function addMessage(text, type, suggestions){
  const chatBox = document.getElementById("chat-box");

  const div = document.createElement("div");
  div.className = type === "user" ? "user-message" : "bot-message";
  div.innerHTML = type === "user" ? text : formatReply(text);
  chatBox.appendChild(div);

  if(suggestions && suggestions.length && type === "bot"){
    const sug = document.createElement("div");
    sug.className = "suggestions";
    suggestions.forEach(s => {
      const btn = document.createElement("button");
      btn.textContent = s;
      btn.onclick = () => quickAsk(s.replace(/^[^\w\s]+\s*/,''));
      sug.appendChild(btn);
    });
    chatBox.appendChild(sug);
  }

  chatBox.scrollTop = chatBox.scrollHeight;
}

async function sendMessage(){
  const input = document.getElementById("user-input");
  const message = input.value.trim();
  if(!message) return;

  // Ukloni welcome poruku
  const welcome = document.querySelector(".welcome");
  if(welcome) welcome.remove();

  addMessage(message, "user");
  chatHistory.push({ role: "user", content: message });
  input.value = "";

  const chatBox = document.getElementById("chat-box");
  const typing = document.createElement("div");
  typing.className = "typing";
  typing.innerText = "Asistent razmišlja...";
  chatBox.appendChild(typing);
  chatBox.scrollTop = chatBox.scrollHeight;

  try {
    const controller = new AbortController();
    const timeout = setTimeout(() => controller.abort(), 25000);

    const response = await fetch("/api/chat", {
      method: "POST",
      signal: controller.signal,
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        message,
        history: chatHistory.slice(-10),
        category: currentCategory
      })
    });

    clearTimeout(timeout);
    typing.remove();

    const data = await response.json();

    if(data.category) currentCategory = data.category;

    if(data.reply){
      addMessage(data.reply, "bot", data.suggestions);
      chatHistory.push({ role: "assistant", content: data.reply });
      // Max history
      if(chatHistory.length > 20) chatHistory = chatHistory.slice(-20);
    } else {
      addMessage("Asistent nije dao odgovor.", "bot");
    }

  } catch(e) {
    typing.remove();
    if(e.name === "AbortError"){
      addMessage("Odgovor traje dulje nego očekivano. Pokušajte ponovno.", "bot");
    } else {
      addMessage("Greška u komunikaciji sa serverom.", "bot");
    }
  }
}

function quickAsk(text){
  document.getElementById("user-input").value = text;
  sendMessage();
}

document.getElementById("send-btn").addEventListener("click", sendMessage);

document.getElementById("user-input").addEventListener("keypress", function(e){
  if(e.key === "Enter"){
    e.preventDefault();
    sendMessage();
  }
});

</script>

</body>
</html>
