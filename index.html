<!DOCTYPE html>
<html lang="hr">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Turistički informator Slavonski Brod</title>

<style>

*{box-sizing:border-box}

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background:#1a3a6b;
color:#222;
height:100vh;
display:flex;
flex-direction:column;
overflow:hidden;
}

header{
background:#142d54;
color:white;
padding:10px 24px;
display:flex;
align-items:center;
gap:16px;
box-shadow:0 2px 8px rgba(0,0,0,0.3);
flex-shrink:0;
}

header .logo-img{
width:56px;
height:56px;
object-fit:contain;
border-radius:8px;
background:white;
padding:4px;
flex-shrink:0;
}

header h1{
margin:0;
font-size:22px;
}

header small{
opacity:0.8;
font-size:13px;
}

.main{
max-width:900px;
width:100%;
margin:0 auto;
padding:16px 24px;
flex:1;
display:flex;
flex-direction:column;
overflow:hidden;
min-height:0;
}

.chat-box{
background:white;
border-radius:14px;
padding:20px;
flex:1;
min-height:0;
box-shadow:0 10px 30px rgba(0,0,0,0.25);
overflow-y:auto;
display:flex;
flex-direction:column;
gap:8px;
}

.user-message{
background:#1a5fa8;
color:white;
padding:12px 16px;
border-radius:10px 10px 2px 10px;
margin:4px 0;
text-align:right;
align-self:flex-end;
max-width:80%;
}

.bot-message{
background:#f4f4f4;
padding:14px 16px;
border-radius:10px 10px 10px 2px;
margin:4px 0;
line-height:1.6;
align-self:flex-start;
max-width:90%;
border-left:3px solid #c8a84b;
}

.typing{
background:#f4f4f4;
padding:12px 16px;
border-radius:10px 10px 10px 2px;
align-self:flex-start;
color:#888;
font-style:italic;
border-left:3px solid #c8a84b;
}

.input-row{
margin-top:16px;
display:flex;
gap:10px;
}

input{
flex:1;
padding:14px 16px;
border-radius:10px;
border:2px solid #ddd;
font-size:16px;
outline:none;
transition:border-color 0.2s;
}

input:focus{
border-color:#1a5fa8;
}

button.send-btn{
background:#c8a84b;
border:none;
padding:12px 22px;
border-radius:10px;
font-weight:bold;
cursor:pointer;
color:#142d54;
font-size:15px;
transition:background 0.2s;
}

button.send-btn:hover{
background:#b8982e;
}

/* Brzi tabovi — unutar welcome okvira, samo na početku */
.quick{
margin-top:18px;
display:flex;
gap:8px;
flex-wrap:wrap;
justify-content:center;
}

.quick button{
background:#1a5fa8;
color:white;
border:none;
padding:10px 16px;
border-radius:20px;
cursor:pointer;
font-size:13px;
transition:background 0.2s;
}

.quick button:hover{
background:#142d54;
}

/* Sugestivna pitanja — kontekstualna, nakon odgovora */
.suggestions{
margin-top:8px;
display:flex;
gap:6px;
flex-wrap:wrap;
}

.suggestions button{
background:white;
color:#1a5fa8;
border:1px solid #1a5fa8;
padding:6px 12px;
border-radius:16px;
cursor:pointer;
font-size:12px;
transition:all 0.2s;
}

.suggestions button:hover{
background:#1a5fa8;
color:white;
}

/* Minijature slika */
.thumbnails{
margin-top:10px;
display:flex;
gap:8px;
flex-wrap:wrap;
}

.thumbnails img{
width:90px;
height:68px;
object-fit:cover;
border-radius:8px;
cursor:pointer;
border:2px solid transparent;
transition:border-color 0.2s, transform 0.2s;
}

.thumbnails img:hover{
border-color:#c8a84b;
transform:scale(1.05);
}

a{
color:#1a5fa8;
text-decoration:none;
font-weight:bold;
cursor:pointer;
}

a:hover{
text-decoration:underline;
}

/* Modal popup za linkove */
#link-modal{
display:none;
position:fixed;
inset:0;
background:rgba(0,0,0,0.6);
z-index:1000;
align-items:center;
justify-content:center;
}

#link-modal.open{
display:flex;
}

.modal-box{
background:white;
border-radius:12px;
width:80vw;
max-width:820px;
height:75vh;
display:flex;
flex-direction:column;
overflow:hidden;
box-shadow:0 20px 60px rgba(0,0,0,0.4);
}

.modal-bar{
background:#142d54;
color:white;
padding:10px 16px;
display:flex;
align-items:center;
justify-content:space-between;
gap:10px;
flex-shrink:0;
}

.modal-bar span{
font-size:13px;
opacity:0.8;
overflow:hidden;
text-overflow:ellipsis;
white-space:nowrap;
flex:1;
}

.modal-bar a.modal-ext{
color:#c8a84b;
font-size:12px;
white-space:nowrap;
text-decoration:none;
}

.modal-bar a.modal-ext:hover{
text-decoration:underline;
}

.modal-close{
background:none;
border:none;
color:white;
font-size:22px;
cursor:pointer;
line-height:1;
padding:0 4px;
flex-shrink:0;
}

.modal-iframe{
flex:1;
border:none;
width:100%;
}

.welcome{
text-align:center;
padding:20px;
color:#666;
}

.welcome .emoji{
font-size:48px;
}

.welcome p{
margin:8px 0;
font-size:15px;
}

</style>

</head>

<body>

<header>
  <img class="logo-img" src="https://www.tzgsb.hr/static/images/tzgsb_logo_120x120.png" alt="TZ Slavonski Brod" onerror="this.style.display='none';document.getElementById('fallback-icon').style.display='flex'">
  <span id="fallback-icon" style="display:none;width:56px;height:56px;border-radius:12px;background:#c8a84b;align-items:center;justify-content:center;font-size:28px;flex-shrink:0">🏰</span>
  <div>
    <h1>Turistički informator</h1>
    <small>Slavonski Brod &bull; AI asistent &bull; Turistička zajednica</small>
  </div>
</header>

<div class="main">

  <div id="chat-box" class="chat-box">
    <div class="welcome" id="welcome-block">
      <p><strong>Dobrodošli u Slavonski Brod!</strong></p>
      <p>Pitajte me o znamenitostima, gastronomiji, smještaju, događanjima i svemu što grad nudi.</p>
      <!-- Brzi tabovi: unutar okvira, skrivaju se nakon prvog upita -->
      <div class="quick" id="quick-tabs">
        <button onclick="quickAsk('Što vidjeti u Slavonskom Brodu?')">🏰 Znamenitosti</button>
        <button onclick="quickAsk('Gdje ručati u Slavonskom Brodu?')">🍽 Gastronomija</button>
        <button onclick="quickAsk('Koja događanja se održavaju?')">🎭 Događanja</button>
        <button onclick="quickAsk('Smještaj u Slavonskom Brodu')">🏨 Smještaj</button>
        <button onclick="quickAsk('Brodsko kolo festival')">🎶 Brodsko kolo</button>
        <button onclick="quickAsk('Izleti iz Slavonskog Broda')">🗺 Okolica</button>
      </div>
    </div>
  </div>

  <div class="input-row">
    <input id="user-input" placeholder="Postavite pitanje o Slavonskom Brodu...">
    <button class="send-btn" id="send-btn">Pošalji</button>
  </div>

</div>

<script>

let chatHistory = [];
let currentCategory = null;
let firstMessage = true;

function formatReply(text){
  return text
    .replace(/\n/g,"<br>")
    .replace(/\*\*(.*?)\*\*/g,"<strong>$1</strong>")
    .replace(/\*(.*?)\*/g,"<em>$1</em>")
    .replace(/\[([^\]]+)\]\(([^)]+)\)/g,'<a href="$2" target="_blank" rel="noopener">$1</a>');
}

function addMessage(text, type, suggestions, images){
  const chatBox = document.getElementById("chat-box");

  const div = document.createElement("div");
  div.className = type === "user" ? "user-message" : "bot-message";
  div.innerHTML = type === "user" ? text : formatReply(text);
  chatBox.appendChild(div);

  if(type === "bot" && images && images.length){
    const thumbs = document.createElement("div");
    thumbs.className = "thumbnails";
    images.forEach(img => {
      const el = document.createElement("img");
      el.src = img.url;
      el.alt = img.alt || '';
      el.title = img.alt || '';
      el.onerror = function(){ this.style.display='none'; };
      el.onclick = () => openModal(img.url);
      thumbs.appendChild(el);
    });
    chatBox.appendChild(thumbs);
  }

  if(suggestions && suggestions.length && type === "bot"){
    const sug = document.createElement("div");
    sug.className = "suggestions";
    suggestions.forEach(s => {
      const btn = document.createElement("button");
      btn.textContent = s;
      btn.onclick = () => quickAsk(s.replace(/^[^\w\s\u00C0-\u024F]+\s*/,''));
      sug.appendChild(btn);
    });
    chatBox.appendChild(sug);
  }

  // Scroll na početak nove poruke, ne na dno — korisnik ručno skrola
  div.scrollIntoView({ behavior: "smooth", block: "start" });
}

async function sendMessage(){
  const input = document.getElementById("user-input");
  const message = input.value.trim();
  if(!message) return;

  // Ukloni welcome blok (sadrži dobrodošicu + tabove) nakon prvog slanja
  if(firstMessage){
    firstMessage = false;
    const welcome = document.getElementById("welcome-block");
    if(welcome) welcome.remove();
  }

  addMessage(message, "user");
  chatHistory.push({ role: "user", content: message });
  input.value = "";

  const chatBox = document.getElementById("chat-box");
  const typing = document.createElement("div");
  typing.className = "typing";
  typing.innerText = "Asistent razmišlja...";
  chatBox.appendChild(typing);
  chatBox.scrollTop = chatBox.scrollHeight;

  try {
    const controller = new AbortController();
    const timeout = setTimeout(() => controller.abort(), 45000);

    const response = await fetch("/api/chat", {
      method: "POST",
      signal: controller.signal,
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        message,
        history: chatHistory.slice(-10),
        category: currentCategory
      })
    });

    clearTimeout(timeout);
    typing.remove();

    const data = await response.json();

    if(data.category) currentCategory = data.category;

    if(data.reply){
      addMessage(data.reply, "bot", data.suggestions, data.images);
      chatHistory.push({ role: "assistant", content: data.reply });
      if(chatHistory.length > 20) chatHistory = chatHistory.slice(-20);
    } else {
      addMessage("Asistent nije dao odgovor.", "bot");
    }

  } catch(e) {
    typing.remove();
    if(e.name === "AbortError"){
      addMessage("Odgovor traje dulje nego očekivano. Pokušajte ponovno.", "bot");
    } else {
      addMessage("Greška u komunikaciji sa serverom.", "bot");
    }
  }
}

function quickAsk(text){
  document.getElementById("user-input").value = text;
  sendMessage();
}

document.getElementById("send-btn").addEventListener("click", sendMessage);

document.getElementById("user-input").addEventListener("keypress", function(e){
  if(e.key === "Enter"){
    e.preventDefault();
    sendMessage();
  }
});

// --- Modal popup za linkove ---
function openModal(url){
  document.getElementById("modal-url").textContent = url;
  document.getElementById("modal-ext").href = url;
  document.getElementById("modal-iframe").src = url;
  document.getElementById("link-modal").classList.add("open");
}

function closeModal(){
  const modal = document.getElementById("link-modal");
  modal.classList.remove("open");
  document.getElementById("modal-iframe").src = "";
}

// Zatvori klikom na pozadinu
document.getElementById("link-modal").addEventListener("click", function(e){
  if(e.target === this) closeModal();
});

// Intercept svih linkova u chat-boxu
document.getElementById("chat-box").addEventListener("click", function(e){
  const a = e.target.closest("a");
  if(!a) return;
  e.preventDefault();
  openModal(a.href);
});

</script>

<!-- Modal popup -->
<div id="link-modal">
  <div class="modal-box">
    <div class="modal-bar">
      <span id="modal-url"></span>
      <a id="modal-ext" class="modal-ext" href="#" target="_blank" rel="noopener">Otvori u novoj kartici ↗</a>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <iframe id="modal-iframe" class="modal-iframe" src="" sandbox="allow-scripts allow-same-origin allow-forms allow-popups"></iframe>
  </div>
</div>

</body>
</html>
